<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BoostBot | Commands</title>
</head>
<body>
    <style>
        * {
            padding: 0;
            margin: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        }

        :root {
            --bg: linear-gradient(-70deg, rgb(111, 111, 245), rgb(174, 231, 200));
        }

        body {
            background: var(--bg);
            text-align: center;
            min-height: 100vh;
            font-weight: 600;
        }

        p {
            font-size: large;

        }

        ol {
            letter-spacing: 1px;
            color: rgb(255, 217, 217);
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.85);
            padding: 1em;
            list-style: none;
        }
    </style>
    <p>Все команды бота и за что они отвечают</p>
    <ol>
        <li>/start</li>
        <li>/commands</li>
        <li>/schedule</li>
        <li>/group</li>
        <li>/convert</li>
    </ol>
</body>
</html>
